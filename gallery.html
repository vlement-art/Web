<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería | Vlement</title>
    <style>
        body { font-family: sans-serif; background: #fff; padding: 40px 20px; margin: 0; }
        h1 { text-align: center; font-weight: 200; letter-spacing: 4px; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .item { text-align: center; }
        .item img { width: 100%; height: auto; border: 1px solid #eee; transition: 0.3s; }
        .item img:hover { opacity: 0.7; }
        .item a { text-decoration: none; color: #333; }
        .titulo { margin-top: 15px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
<body>
    <h1>GALERÍA</h1>
    <div class="grid">
        <!-- BLOQUE DE OBRA -->
        <div class="item">
            <a href="artworks/dream-fragment.html">
                <img src="images/IMG_1595.jpeg" alt="Dream Fragment">
                <p class="titulo">Dream Fragment</p>
            </a>
        </div>
        <!-- Fin del bloque -->
    </div>
</body>
</html>
